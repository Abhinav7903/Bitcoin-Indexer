# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: indexer
    main: ./cmd/indexer
    binary: btc-indexer
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: api
    main: ./cmd/api
    binary: btc-api
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: backfill
    main: ./cmd/backfill
    binary: btc-backfill
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # this name template makes the result look like btc-indexer_1.0.0_linux_amd64.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - src: migrations/**/*
      - src: docker-compose.yml
      - src: config.sample.yaml
      - src: README.md
      - src: LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
